services:
  - type: web
    name: royco-jewellers-store
    env: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node scripts/apply-migrations.mjs && node local-server/app.mjs
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: royco-persistent-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
      - key: DATABASE_URL
        fromDatabase:
          name: royco-postgres
          property: connectionString
      - key: ROYCO_PERSISTENT_DIR
        value: /data
      - key: ROYCO_STORE_PATH
        value: /data/store.json
      - key: ROYCO_UPLOADS_DIR
        value: /data/uploads
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: Admin@Royco
      - key: ADMIN_PASSWORD
        value: Admin@123
      - key: PUBLIC_SITE_URL
        value: https://your-render-app.onrender.com

databases:
  - name: royco-postgres
    databaseName: royco
    user: royco
    plan: starter
